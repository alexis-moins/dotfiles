format = """
$directory\
$git_branch\
$git_state\
$git_status\
$character
"""

right_format = """
$python\
$ocaml\
$jobs\
$time\
"""

#
# Palettes
#

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[palettes.rose-pine-dawn]
overlay = '#f2e9e1'
love = '#b4637a'
gold = '#ea9d34'
rose = '#d7827e'
pine = '#286983'
foam = '#56949f'
iris = '#907aa9'

#
#
#

[directory]
format = "[î‚¶](fg:overlay)[ $path ]($style)[î‚´](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 2
truncation_symbol = "â€¦/"

[directory.substitutions]
Documents = "َ°ˆ™"
Downloads = "ï€™ "
Music = "ï€پ "
Pictures = "ï€¾ "

[jobs]
format = "[$symbol$number]($style) "
number_threshold = 1
symbol = "*"
style = "bold purple"

[git_branch]
format = " [î‚¶](fg:overlay)[ $symbol $branch ]($style)[î‚´](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "ïگک"

