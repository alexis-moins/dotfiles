[git_status]
style = "bg:overlay fg:love"
format = ' [î‚¶](fg:overlay)[( $all_status)( $ahead_behind) ]($style)[î‚´](fg:overlay)'
up_to_date = '[âœ“](bg:overlay fg:iris)'
untracked = '[â€¦${count}](bg:overlay fg:gold)'
stashed = '[â‰،${count}](bg:overlay fg:iris)'
modified = '[~${count}](bg:overlay fg:gold)'
renamed = '[*${count}](bg:overlay fg:iris)'
deleted = '[-${count}](style)'
staged = '[+${count}](bg:overlay fg:gold)'
ahead = '[â†‘${count}](bg:overlay fg:foam)'
diverged = '[â†‘${ahead_count}](bg:overlay fg:foam)[â†“${behind_count}](bg:overlay fg:rose)'
behind = '[â†“${count}](bg:overlay fg:rose)'

[time]
disabled = false
format = " [î‚¶](fg:overlay)[ $time َ°´ˆ ]($style)[î‚´](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%H:%M"
use_12hr = false

[character]
# â‌¯ or â‍œ
success_symbol = " [â‍œ](fg:white)"
error_symbol = " [â‍œ](fg:love)"
vimcmd_symbol = " [â‍œ](fg:gold)"
vimcmd_visual_symbol = " [â‍œ](fg:iris)"

#
# Languages
#

# [python]
# format = '#[(($virtualenv-)$version )]($style)'
# style = "green"
[python]
style = "bg:overlay fg:pine"
format = "[î‚¶](fg:overlay)[ $symbol$version ]($style)[î‚´](fg:overlay)"
disabled = false
symbol = 'îœ¼ '

[nodejs]
symbol = ""

[golang]
symbol = "go "
style = "italic bold black"

[elixir]
symbol = "elixir "
style = "italic bold black"

[ocaml]
format = '$switch_indicator[$switch_name-$version ]($style)'
global_switch_indicator = '#'
style = "green"


[shell]
disabled = false

[shlvl]
disabled = false
style = "#6e738d"
format = '[\($shlvl\) ]($style)'
repeat = true
threshold = 2
repeat_offset = 1
