format = """
$directory\
$git_branch\
$git_state\
$git_status\
$character
"""

right_format = """
$python\
$ocaml\
$jobs\
$time\
"""

#
# Palettes
#

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[palettes.rose-pine-dawn]
overlay = '#f2e9e1'
love = '#b4637a'
gold = '#ea9d34'
rose = '#d7827e'
pine = '#286983'
foam = '#56949f'
iris = '#907aa9'

#
#
#

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 2
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[jobs]
format = "[$symbol$number]($style) "
number_threshold = 1
symbol = "*"
style = "bold purple"

[git_branch]
format = " [оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

# [git_status]
# style = "red"
# # format = '[($conflicted )($stashed )($deleted )($renamed )($modified )($staged )($untracked )]($style)'
#
# diverged = "$ahead$behind"
# ahead = "вҶ‘$count"
# behind = "вҶ“$count"
#
# stashed = "вүЎ$count"
# staged = "+$count"
# untracked = "вҖҰ$count"
# modified = "~$count"
#
# deleted = "-$count"
# renamed = "*$count"

[git_status]
style = "bg:overlay fg:love"
format = ' [оӮ¶](fg:overlay)[ $all_status$ahead_behind ]($style)[оӮҙ](fg:overlay)'
up_to_date = '[вң“](bg:overlay fg:iris)'
untracked = '[вҖҰ${count}](bg:overlay fg:gold)'
stashed = '[вүЎ${count}](bg:overlay fg:iris)'
modified = '[~${count}](bg:overlay fg:gold)'
renamed = '[*${count}](bg:overlay fg:iris)'
deleted = '[-${count}](style)'
staged = '[+${count}](bg:overlay fg:gold)'
ahead = '[вҶ‘${count}](bg:overlay fg:foam)'
diverged = '[вҶ‘${ahead_count}](bg:overlay fg:foam)[вҶ“${behind_count}](bg:overlay fg:rose)'
behind = '[вҶ“${count}](bg:overlay fg:rose)'

[time]
disabled = false
format = " [оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%H:%M"
use_12hr = false

[character]
# вқҜ or вһң
success_symbol = " [вһң](fg:white)"
error_symbol = " [вһң](fg:love)"
vimcmd_symbol = " [вһң](fg:gold)"
vimcmd_visual_symbol = " [вһң](fg:iris)"

#
# Languages
#

# [python]
# format = '#[(($virtualenv-)$version )]($style)'
# style = "green"
[python]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
disabled = false
symbol = 'оңј '

[nodejs]
symbol = ""

[golang]
symbol = "go "
style = "italic bold black"

[elixir]
symbol = "elixir "
style = "italic bold black"

[ocaml]
format = '$switch_indicator[$switch_name-$version ]($style)'
global_switch_indicator = '#'
style = "green"


[shell]
disabled = false

[shlvl]
disabled = false
style = "#6e738d"
format = '[\($shlvl\) ]($style)'
repeat = true
threshold = 2
repeat_offset = 1
