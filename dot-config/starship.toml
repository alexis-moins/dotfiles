format = """
$directory\
$git_branch\
$git_state\
$git_status\
$character
"""

right_format = """
$python\
$nodejs\
$ocaml\
$rust\
$elixir\
$golang\
$cmd_duration\
$jobs\
"""

#$time\

#
# Palettes
#

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[palettes.rose-pine-dawn]
overlay = '#f2e9e1'
love = '#b4637a'
gold = '#ea9d34'
rose = '#d7827e'
pine = '#286983'
foam = '#56949f'
iris = '#907aa9'

#
# Left components
#

[directory]
format = "[Óā∂](fg:overlay)[ $path ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
Documents = "ůįąô"
Downloads = "ÔÄô "
Music = "ÔÄĀ "
Pictures = "ÔÄĺ "

[git_branch]
format = " [Óā∂](fg:overlay)[ $symbol $branch ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "Ôźė"

[git_state]
format = " [Óā∂](fg:overlay)[ $state( $progress_count/$progress_total) ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:gold"

[git_status]
style = "bg:overlay fg:love"
format = ' [Óā∂](fg:overlay)[( $all_status)( $ahead_behind) ]($style)[Óāī](fg:overlay)'
up_to_date = '[‚úď](bg:overlay fg:iris)'
untracked = '[‚Ä¶${count}](style)'
stashed = '[‚Č°${count}](bg:overlay fg:iris)'
modified = '[~${count}](bg:overlay fg:gold)'
renamed = '[*${count}](bg:overlay fg:iris)'
deleted = '[-${count}](style)'
staged = '[+${count}](bg:overlay fg:foam)'
ahead = '[‚ÜĎ${count}](bg:overlay fg:pine)'
diverged = '[‚ÜĎ${ahead_count}](bg:overlay fg:foam)[‚Üď${behind_count}](bg:overlay fg:rose)'
behind = '[‚Üď${count}](bg:overlay fg:rose)'

[character]
# ‚ĚĮ or ‚ěú
success_symbol = " [‚ěú](fg:white)"
error_symbol = " [‚ěú](fg:love)"
vimcmd_symbol = " [‚ěú](fg:gold)"
vimcmd_visual_symbol = " [‚ěú](fg:iris)"

#
# Right components
#

[cmd_duration]
format = " [Óā∂](fg:overlay)[ $duration ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:love"
min_time = 3_000

[jobs]
format = " [Óā∂](fg:overlay)[ $symbol $number ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:iris"
number_threshold = 1
symbol = "‚ü≤"

[time]
disabled = false
format = " [Óā∂](fg:overlay)[ $time ůįīą ]($style)[Óāī](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%H:%M"
use_12hr = false

#
# Languages
#

[python]
style = "bg:overlay fg:pine"
# format = '#[(($virtualenv-)$version )]($style)'
format = " [Óā∂](fg:overlay)[ $symbol$version ]($style)[Óāī](fg:overlay)"
disabled = false
symbol = 'Óúľ '

[nodejs]
style = "bg:overlay fg:pine"
format = " [Óā∂](fg:overlay)[ $symbol$version ]($style)[Óāī](fg:overlay)"
disabled = false
symbol = "ůįéô "

[ocaml]
format = '$switch_indicator[$switch_name-$version ]($style)'
global_switch_indicator = '#'
style = "green"

[rust]
style = "bg:overlay fg:pine"
format = " [Óā∂](fg:overlay)[ $symbol$version ]($style)[Óāī](fg:overlay)"
disabled = false
symbol = "Óě® "

[elixir]
style = "bg:overlay fg:pine"
format = " [Óā∂](fg:overlay)[ $symbol$version ]($style)[Óāī](fg:overlay)"
disabled = false
symbol = "ÓČĶ "

[golang]
style = "bg:overlay fg:pine"
format = " [Óā∂](fg:overlay)[ $symbol$version ]($style)[Óāī](fg:overlay)"
disabled = false
symbol = "Óėß "
